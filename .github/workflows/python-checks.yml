name: Python checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Show environment
        run: |
          python --version
          python -c "import sys; print(sys.path)"
      - name: Run tests
        run: python -m pytest -q
      - name: Run synthetic recommender lab smoke test
        run: python scripts/run_synthetic_recommender_lab.py --users 40 --items 70 --interactions-per-user 7 --top-k 8 --seed 7 --output-dir outputs_ci
